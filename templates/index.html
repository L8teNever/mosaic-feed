{% extends "base.html" %}
{% block title %}Feed{% endblock %}
{% block body %}
<header class="appbar">
  <h1>Feed</h1>
  <button class="icon-btn" id="shuffleBtn" title="Neu mischen" aria-label="Neu mischen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 3 21 3 21 8"></polyline>
      <line x1="4" y1="20" x2="21" y2="3"></line>
      <polyline points="21 16 21 21 16 21"></polyline>
      <line x1="15" y1="15" x2="21" y2="21"></line>
      <line x1="4" y1="4" x2="9" y2="9"></line>
    </svg>
  </button>
  <button class="icon-btn" id="themeBtn" title="Theme wechseln" aria-label="Theme wechseln">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
  <a class="icon-btn" href="/stats" title="Statistik" aria-label="Statistik">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"></line>
      <line x1="12" y1="20" x2="12" y2="4"></line>
      <line x1="6" y1="20" x2="6" y2="14"></line>
    </svg>
  </a>
</header>

<main class="page">
  <div id="feed" class="feed"></div>
</main>

<button class="fab" id="uploadFab" title="Bilder hochladen" aria-label="Bilder hochladen">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"></line>
    <line x1="5" y1="12" x2="19" y2="12"></line>
  </svg>
</button>
<input type="file" id="fileInput" accept="image/*" multiple hidden />

<div class="progress-wrap" id="progressWrap">
  <div class="progress-label" id="progressLabel">Lade hoch…</div>
  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
</div>

<div class="snackbar" id="snackbar"></div>
{% endblock %}
{% block scripts %}
<script>document.addEventListener("DOMContentLoaded", initFeedPage);</script>
{% endblock %}
