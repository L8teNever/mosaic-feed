{% extends "base.html" %}
{% block title %}Statistik{% endblock %}
{% block body %}
<meta name="cf-worker-bypass" content="true" />
<header class="appbar">
  <a class="icon-btn" id="backBtn" href="/" title="Zurück zum Feed" aria-label="Zurück zum Feed">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
  </a>
  <h1>Statistik</h1>
  <div class="appbar-actions">
    <button class="icon-btn" id="recomputeBtn" title="Ähnlichkeit für alle Bilder neu berechnen"
      aria-label="Ähnlichkeit für alle Bilder neu berechnen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"></polyline>
        <line x1="4" y1="20" x2="21" y2="3"></line>
        <polyline points="21 16 21 21 16 21"></polyline>
        <line x1="15" y1="15" x2="21" y2="21"></line>
        <line x1="4" y1="4" x2="9" y2="9"></line>
      </svg>
    </button>
    <button class="icon-btn" id="themeBtn" title="Theme wechseln" aria-label="Theme wechseln">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </div>
</header>

<main class="page">
  <div id="statsGrid" class="stats-grid"></div>
</main>

<div class="snackbar" id="snackbar"></div>
{% endblock %}
{% block scripts %}
<script>document.addEventListener("DOMContentLoaded", initStatsPage);</script>
{% endblock %}
