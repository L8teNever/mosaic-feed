{% extends "base.html" %}
{% block title %}Entdecken{% endblock %}
{% block body %}
<meta name="cf-worker-bypass" content="true">
<header class="appbar">
  <a class="icon-btn" id="backBtn" href="/" title="Zurück zum Feed" aria-label="Zurück zum Feed">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
  </a>
  <h1>Entdecken</h1>
  <div class="appbar-actions">
    <button class="icon-btn" id="discoverReloadBtn" title="Neu mischen" aria-label="Neu mischen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"></polyline>
        <line x1="4" y1="20" x2="21" y2="3"></line>
        <polyline points="21 16 21 21 16 21"></polyline>
        <line x1="15" y1="15" x2="21" y2="21"></line>
        <line x1="4" y1="4" x2="9" y2="9"></line>
      </svg>
    </button>
    <button class="icon-btn theme-toggle-btn" id="themeBtn" title="Theme wechseln" aria-label="Theme wechseln">
      <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </div>
</header>

<main class="page discover-page">
  <div class="swipe-stack" id="swipeStack">
    <div class="spinner"></div>
  </div>
  <div class="swipe-controls" id="swipeControls">
    <button class="swipe-btn pass-btn" id="passBtn" title="Nicht gefällt mir" aria-label="Nicht gefällt mir">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <button class="swipe-btn like-btn-round" id="likeAllBtn" title="Gefällt mir" aria-label="Gefällt mir">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M12 21s-6.7-4.35-9.3-8.1C1 10.1 1.6 6.9 4.2 5.3c2.2-1.4 5-.8 6.6 1.1l1.2 1.4 1.2-1.4c1.6-1.9 4.4-2.5 6.6-1.1 2.6 1.6 3.2 4.8 1.5 7.6C18.7 16.65 12 21 12 21z" />
      </svg>
    </button>
  </div>
</main>

<div class="snackbar" id="snackbar"></div>
{% endblock %}
{% block scripts %}
<script>document.addEventListener("DOMContentLoaded", initDiscoverPage);</script>
{% endblock %}
